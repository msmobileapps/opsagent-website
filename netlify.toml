[build]
  publish = "."
  command = "echo 'Static site — no build needed'"

[build.environment]
  NODE_VERSION = "20"


# Pretty URL rewrites
[[redirects]]
  from = "/intake"
  to = "/intake.html"
  status = 200

[[redirects]]
  from = "/integrations"
  to = "/integrations.html"
  status = 200

[[redirects]]
  from = "/case-study"
  to = "/case-study.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/support.html"
  status = 200

# Hebrew default, English via ?lang=en
[[redirects]]
  from = "/he/*"
  to = "/he/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
